<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4682b4">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/typescript.min.js"></script>
    <script src="element-table.js" type="module"></script>
    <script src="element-grid.js" type="module"></script>
    <script src="element-contextmenu.js" type="module"></script>
    <script src="widget-image.js" type="module"></script>
    <script src="widget-code.js" type="module"></script>
    <script src="widget-text.js" type="module"></script>
    <script src="widget-taskstatus.js" type="module"></script>
    <script src="widget-tasktype.js" type="module"></script>
    <script src="widget-taskid.js" type="module"></script>
    <script src="widget-taskname.js" type="module"></script>
     <script src="widget-hashimg.js" type="module"></script>
     <script src="widget-multi.js" type="module"></script>
     <script src="widget-transitions.js" type="module"></script>
     <script src="header.js"></script>
</head>

<body>
    <div id="header-placeholder"></div>
    <h2>Add New Task</h2>
    <form id="addTaskForm">
        <label>Script Source:</label>
        <div>
            <input type="radio" id="sourceLibrary" name="scriptSource" value="library" checked>
            <label for="sourceLibrary" style="display:inline;">Select from library</label>
            <input type="radio" id="sourceManual" name="scriptSource" value="manual" style="margin-left:15px;">
            <label for="sourceManual" style="display:inline;">Manual entry</label>
        </div><br>

        <div id="librarySection">
            <label for="scriptSelect">Select Script:</label>
            <select id="scriptSelect">
                <option value="">-- Choose a script --</option>
            </select><br><br>
        </div>

        <div id="manualSection" style="display:none;">
            <label for="manualScript">Script Content:</label>
            <textarea id="manualScript" rows="15" cols="50" placeholder="Enter your script here..."></textarea><br><br>

            <label for="taskType">Task Type:</label>
            <select id="taskType" onchange="toggleTaskTypeOther()">
                <option value="python">Python</option>
                <option value="bash">Bash</option>
                <option value="deno">Deno</option>
                <option value="other">Other (specify)</option>
            </select>
            <input type="text" id="taskTypeOther" placeholder="Enter task type..." style="display:none; margin-left:10px;"><br><br>
        </div>

        <label for="taskName">Task Name:</label>
        <input type="text" id="taskName" placeholder="Optional task name"><br><br>

        <label for="taskData">Data (JSON):</label>
        <textarea id="taskData" rows="10" cols="50" placeholder='{"key": "value"}'></textarea><br><br>

        <label for="transitions">Transitions (JSON):</label>
        <textarea id="transitions" rows="5" cols="50" placeholder='[]'></textarea><br><br>

        <label for="status">Initial Status:</label>
        <select id="status">
            <option value="0">Awaiting</option>
            <option value="4">Paused</option>
        </select><br><br>

        <button type="submit">Add Task</button>
    </form>

    <script>
        const headers = {};
        if (localStorage.hasOwnProperty("jwt_token")) {
            headers["Authorization"] = `Bearer ${localStorage["jwt_token"]}`;
        }

        let library = [];

        // Fetch library
        fetch("/library", { headers })
            .then(response => response.json())
            .then(data => {
                library = data;
                const select = document.getElementById('scriptSelect');
                data.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.filename;
                    option.textContent = item.name || item.filename;
                    select.appendChild(option);
                });

                // Check for script parameter in URL
                const urlParams = new URLSearchParams(window.location.search);
                const scriptParam = urlParams.get('script');
                if (scriptParam) {
                    select.value = scriptParam;
                    select.dispatchEvent(new Event('change')); // Trigger change event to fill form
                }
            })
            .catch(err => console.error('Failed to load library:', err));

        // Toggle between library and manual script entry
        document.querySelectorAll('input[name="scriptSource"]').forEach(radio => {
            radio.addEventListener('change', function() {
                const librarySection = document.getElementById('librarySection');
                const manualSection = document.getElementById('manualSection');
                if (this.value === 'library') {
                    librarySection.style.display = 'block';
                    manualSection.style.display = 'none';
                    document.getElementById('scriptSelect').required = true;
                    document.getElementById('manualScript').required = false;
                } else {
                    librarySection.style.display = 'none';
                    manualSection.style.display = 'block';
                    document.getElementById('scriptSelect').required = false;
                    document.getElementById('manualScript').required = true;
                }
            });
        });

        // Toggle task type "other" input
        function toggleTaskTypeOther() {
            const select = document.getElementById('taskType');
            const otherInput = document.getElementById('taskTypeOther');
            otherInput.style.display = select.value === 'other' ? 'inline-block' : 'none';
        }

        // Handle script selection
        document.getElementById('scriptSelect').addEventListener('change', function() {
            const selected = library.find(item => item.filename === this.value);
            if (selected) {
                document.getElementById('taskName').value = selected.name || '';
                document.getElementById('taskData').value = JSON.stringify(selected.suggestedData, null, 2);
                document.getElementById('transitions').value = JSON.stringify(selected.transitions || [], null, 2);
                // Could show comments somewhere, e.g., alert or div
                if (selected.comments) {
                    alert(`Comments: ${selected.comments}`);
                }
            }
        });

        // Handle form submission
        document.getElementById('addTaskForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const scriptSource = document.querySelector('input[name="scriptSource"]:checked').value;
            let scriptContent, taskType;

            if (scriptSource === 'library') {
                const selectedScript = document.getElementById('scriptSelect').value;
                const scriptItem = library.find(item => item.filename === selectedScript);
                if (!scriptItem) return;

                const dir = selectedScript.includes('.template.') ? 'scripts' : 'library';
                fetch(`/${dir}/${selectedScript}`)
                    .then(res => res.text())
                    .then(content => {
                        scriptContent = content;
                        taskType = selectedScript.endsWith('.py') ? 'python' : selectedScript.endsWith('.sh') ? 'bash' : 'deno';
                        submitTask(scriptContent, taskType, scriptItem.capabilitiesSchema);
                    });
            } else {
                scriptContent = document.getElementById('manualScript').value;
                let type = document.getElementById('taskType').value;
                if (type === 'other') {
                    type = document.getElementById('taskTypeOther').value;
                }
                taskType = type;
                submitTask(scriptContent, taskType, null);
            }

            function submitTask(script, type, capabilitiesSchema) {
                const body = {
                    script: script,
                    name: document.getElementById('taskName').value || undefined,
                    data: JSON.parse(document.getElementById('taskData').value || '{}'),
                    transitions: JSON.parse(document.getElementById('transitions').value || '[]'),
                    status: parseInt(document.getElementById('status').value),
                    type: type,
                    capabilitiesSchema: capabilitiesSchema
                };

                fetch('/tasks', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...headers
                    },
                    body: JSON.stringify(body)
                })
                .then(res => res.json())
                .then(data => {
                    alert(`Task added! ID: ${data.id}`);
                })
                .catch(err => {
                    console.error('Failed to add task:', err);
                    alert('Failed to add task');
                });
            }
        });
    </script>
</body>

</html>
